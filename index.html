<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Architect | Ultra Pro v4.2</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050a18; color: #f8fafc; font-size: 18px; }
        .sidebar { background: #0f172a; border-right: 1px solid rgba(255,255,255,0.05); }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; }
        .nav-link { color: #94a3b8; transition: all 0.2s; cursor: pointer; font-size: 15px; }
        .nav-link:hover, .nav-link.active { color: #f8fafc; background: #1e293b; border-left: 5px solid #3b82f6; }
        .metric-card { background: #0f172a; border: 1px solid #1e293b; padding: 28px; border-radius: 24px; }
        .result-box { background: #020617; border-radius: 28px; border: 1px solid #1e293b; padding: 35px; font-size: 1.1rem; line-height: 1.8; }
        input, textarea, select { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; font-size: 1.1rem !important; }
        .copy-btn { background: #10b981; color: white; padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 800; transition: all 0.2s; }
        .copy-btn:hover { background: #059669; transform: scale(1.05); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar w-72 fixed inset-y-0 left-0 hidden md:flex flex-col p-8 z-50">
        <div class="mb-12 px-2"><h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 tracking-tighter">AI ARCHITECT</h1></div>
        <nav class="flex-grow space-y-4">
            <button onclick="showTab('nicheTab')" class="nav-link active w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold uppercase tracking-widest"><span>📊</span> Intelligence</button>
            <button onclick="showTab('promptTab')" class="nav-link w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold uppercase tracking-widest"><span>✍️</span> Prompt Master</button>
            <button onclick="showTab('imageTab')" class="nav-link w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold uppercase tracking-widest"><span>🎨</span> Image Studio</button>
            <button onclick="showTab('visionTab')" class="nav-link w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold uppercase tracking-widest"><span>👁️</span> Vision Master</button>
            <button onclick="showTab('storeTab')" class="nav-link w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold uppercase tracking-widest"><span>📂</span> Archive</button>
        </nav>
    </aside>

    <main class="flex-grow md:ml-72 p-8 md:p-12">
        <div class="flex items-center justify-between mb-12">
            <h2 id="tabTitle" class="text-3xl font-black text-white italic tracking-tight">Intelligence Dashboard</h2>
            <div class="flex items-center gap-3 bg-slate-900 px-5 py-2.5 rounded-2xl border border-slate-800">
                <div class="h-3 w-3 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-xs font-black text-slate-500 uppercase tracking-widest">System Online</span>
            </div>
        </div>

        <div id="nicheTab" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-4 space-y-8">
                    <div class="glass-card p-8">
                        <h3 class="text-xs font-black text-slate-500 mb-6 uppercase tracking-widest">Niche Scanner</h3>
                        <input type="text" id="nicheInput" class="w-full p-4 mb-5 rounded-xl" placeholder="e.g., Wildlife POV">
                        <button onclick="analyzeNichePro()" id="analyzeBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black shadow-lg flex items-center justify-center gap-3 text-sm">
                            <span id="btnText">ANALYZE NICHE</span>
                            <div id="loader" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
                        </button>
                    </div>
                    <div id="stepTwo" class="glass-card p-8 hidden opacity-0 translate-y-5 transition-all duration-700 border-l-8 border-emerald-500">
                        <h3 class="text-xs font-black text-emerald-500 mb-6 uppercase tracking-widest">Step 2: Selection</h3>
                        <div class="grid gap-4">
                            <button onclick="generatePackage('image')" class="p-5 bg-slate-900 border border-slate-800 rounded-2xl hover:border-blue-500 text-left">
                                <p class="text-lg font-black text-white uppercase">Image Package</p>
                                <p class="text-xs text-slate-500">Social Posts & Carousels</p>
                            </button>
                            <button onclick="generatePackage('video')" class="p-5 bg-slate-900 border border-slate-800 rounded-2xl hover:border-purple-500 text-left">
                                <p class="text-lg font-black text-white uppercase">Video Package</p>
                                <p class="text-xs text-slate-500">TikTok & Reels Storyboard</p>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-8 space-y-10">
                    <div id="reportContainer" class="glass-card p-10 min-h-[650px]">
                        <div id="placeholder" class="h-full flex flex-col items-center justify-center py-48 opacity-20"><p class="text-sm font-black tracking-widest uppercase">Waiting for Analysis</p></div>
                        <div id="analysisView" class="hidden">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                                <div class="metric-card"><p class="text-xs font-black text-slate-500 uppercase">Growth</p><p id="m-growth" class="text-4xl font-black text-blue-400 mt-3">--</p></div>
                                <div class="metric-card"><p class="text-xs font-black text-slate-500 uppercase">Viral Score</p><p id="m-viral" class="text-4xl font-black text-purple-400 mt-3">--</p></div>
                                <div class="metric-card"><p class="text-xs font-black text-slate-500 uppercase">Competition</p><p id="m-comp" class="text-4xl font-black text-emerald-400 mt-3">--</p></div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-12"><canvas id="mainChart"></canvas><canvas id="pieChart"></canvas></div>
                            <h2 class="text-2xl font-black mb-8 italic underline decoration-blue-500 decoration-4">STRATEGY REPORT</h2>
                            <div id="deepReportText" class="result-box prose prose-invert prose-lg max-w-none mb-12 text-slate-300"></div>
                            <div id="finalOutput" class="hidden opacity-0 transition-all duration-700 mt-16">
                                <div class="flex items-center justify-between mb-8">
                                    <h3 class="text-lg font-black text-emerald-500 uppercase">Master Prompt Package</h3>
                                    <button onclick="copyMasterPrompt()" class="copy-btn">Copy Prompt 📋</button>
                                </div>
                                <div id="finalPromptBox" class="result-box bg-blue-900/10 border-blue-500/30 font-mono text-sm overflow-x-auto whitespace-pre-wrap"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="promptTab" class="tab-content hidden"><div class="glass-card p-10"><h2 class="text-2xl font-black mb-8">Prompt Master</h2><textarea id="basicIdea" class="w-full min-h-[200px] mb-8 p-4 rounded-xl" placeholder="Basic idea..."></textarea><button onclick="generatePrompt()" class="bg-blue-600 px-10 py-5 rounded-2xl font-black uppercase text-sm">Enhance ✨</button><div id="enhancedPrompt" class="mt-10 result-box"></div></div></div>
        <div id="imageTab" class="tab-content hidden"><div class="glass-card p-10">
            <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-8">Renderer</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div><label class="text-xs font-bold uppercase mb-2 block">Aspect Ratio</label><select id="imgRatio" class="w-full p-4 rounded-xl"><option value="1024x1024">1:1 Square</option><option value="896x1120">4:5 Portrait</option><option value="768x1344">9:16 Vertical</option><option value="1344x768">16:9 Landscape</option><option value="1152x896">4:3 Photo</option></select></div>
                <div><label class="text-xs font-bold uppercase mb-2 block">Quality</label><select id="imgQuality" class="w-full p-4 rounded-xl"><option value="8k, photorealistic, cinematic">Cinematic Pro</option></select></div>
            </div>
            <textarea id="imagePrompt" class="w-full min-h-[150px] mb-6 p-4 rounded-xl" placeholder="Paste prompt..."></textarea>
            <button onclick="generateImage()" id="imgBtn" class="bg-blue-600 px-10 py-5 rounded-2xl font-black uppercase w-full">Render masterpiece 🎨</button>
            <div class="mt-10 border-4 border-dashed border-slate-800 rounded-[3rem] p-6 flex justify-center items-center bg-slate-950/30 min-h-[500px]">
                <img id="resultImage" class="max-w-full max-h-[700px] rounded-2xl hidden shadow-2xl" /><p id="imagePlaceholder" class="text-slate-700 font-black text-xs uppercase">No active render</p>
            </div>
            <button id="downloadBtn" onclick="downloadImage()" class="mt-6 bg-emerald-600 w-full py-4 rounded-xl font-black hidden">DOWNLOAD ⬇️</button>
        </div></div>
        <div id="visionTab" class="tab-content hidden"><div class="glass-card p-10"><h2 class="text-2xl font-black mb-8">Vision Master 👁️</h2><div class="border-4 border-dashed border-slate-900 rounded-[3rem] p-6 flex flex-col items-center bg-slate-950/30 min-h-[400px] relative mb-8"><input type="file" onchange="handleImageSelect(event)" class="absolute inset-0 opacity-0 cursor-pointer z-20"><img id="uploadPreview" class="max-w-full max-h-[350px] rounded-2xl hidden z-10" /><div id="uploadPlaceholder" class="text-slate-600">📸<br><p class="text-xs font-bold uppercase mt-4">Drop Image</p></div></div><button onclick="extractPrompt()" id="extractBtn" class="bg-blue-600 w-full py-5 rounded-2xl font-black">EXTRACT PROMPT</button><div id="visionResult" class="mt-10 result-box"></div></div></div>
        <div id="storeTab" class="tab-content hidden"><div class="glass-card p-10"><h2 class="text-2xl font-black mb-10">Archive Vault</h2><div class="flex gap-4 mb-10"><button onclick="loadStore()" class="bg-slate-800 px-8 py-4 rounded-xl text-xs font-black">REFRESH 🔄</button><button onclick="clearStore()" class="bg-red-900/30 text-red-500 px-8 py-4 rounded-xl text-xs font-black border border-red-900/50">WIPE 🗑️</button></div><div id="savedItemsList" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div></div></div>

    </main>

    <script>
        const WORKER_URL = "https://my-ai-backend.freyaendicott.workers.dev"; // <--- CHANGE THIS
        let charts = {};
        let rawPackageData = "";
        let currentImageUrl = null;
        let uploadedImageBase64 = "", uploadedImageMime = "";

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
            const titles = { nicheTab: "Intelligence Dashboard", promptTab: "Prompt Master", imageTab: "Image Studio", visionTab: "Vision Logic", storeTab: "Archive Vault" };
            document.getElementById('tabTitle').innerText = titles[tabId];
        }

        async function analyzeNichePro() {
            const niche = document.getElementById('nicheInput').value;
            if(!niche) return alert("Enter Niche!");
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            btnText.classList.add('hidden'); loader.classList.remove('hidden');

            try {
                const res = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "generate_text", prompt: `Analyze niche "${niche}". Output ONLY JSON: {"metrics": {"growth": "90%", "viral": "95/100", "comp": "Mid"}, "trend": [30, 45, 60, 85, 75, 98], "demo": [50, 30, 15, 5], "report": "Detailed strategy summary."}` }) });
                const data = await res.json();
                const json = JSON.parse(data.result.match(/\{[\s\S]*\}/)[0]);
                
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('analysisView').classList.remove('hidden');
                document.getElementById('m-growth').innerText = json.metrics.growth;
                document.getElementById('m-viral').innerText = json.metrics.viral;
                document.getElementById('m-comp').innerText = json.metrics.comp;
                document.getElementById('deepReportText').innerHTML = marked.parse(json.report);
                renderCharts(json.trend, json.demo);
                document.getElementById('stepTwo').classList.remove('hidden');
                setTimeout(() => document.getElementById('stepTwo').classList.add('opacity-100', 'translate-y-0'), 100);
            } catch(e) { alert("Analysis Connection Failed. Check Worker URL."); }
            finally { btnText.classList.remove('hidden'); loader.classList.add('hidden'); }
        }

        function renderCharts(line, pie) {
            if(charts.l) charts.l.destroy(); if(charts.p) charts.p.destroy();
            charts.l = new Chart(document.getElementById('mainChart'), { type: 'line', data: { labels: ['M1','M2','M3','M4','M5','M6'], datasets: [{ data: line, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)' }]}, options: { plugins: { legend: false }, scales: { y: { display: false } } } });
            charts.p = new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels: ['USA','Asia','EU','Other'], datasets: [{ data: pie, backgroundColor: ['#3b82f6','#8b5cf6','#ec4899','#1e293b'], borderWidth: 0 }]}, options: { plugins: { legend: { position: 'bottom', labels: { color: '#64748b', font: { size: 10 } } } } } });
        }

        async function generatePackage(type) {
            const niche = document.getElementById('nicheInput').value;
            const resBox = document.getElementById('finalPromptBox');
            const container = document.getElementById('finalOutput');
            container.classList.remove('hidden');
            resBox.innerHTML = "<p class='animate-pulse text-blue-400 font-black uppercase'>Engineering Elite " + type.toUpperCase() + " Package...</p>";
            
            try {
                const res = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "generate_text", prompt: `Generate massive master prompt for niche: "${niche}". Selection: ${type}. Include Role, Mission, Style, 7 Phases, technical AI prompts, captions.` }) });
                const data = await res.json();
                rawPackageData = data.result;
                resBox.innerHTML = marked.parse(rawPackageData);
                setTimeout(() => container.classList.add('opacity-100'), 100);
                container.scrollIntoView({ behavior: 'smooth' });
            } catch(e) { alert("Step 2 Generation Failed."); }
        }

        function copyMasterPrompt() {
            const text = document.getElementById('finalPromptBox').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Copied to Clipboard! ✅"));
        }

        // Logic for other tabs...
        async function generatePrompt() { /* logic from previous Turn */ }
        async function generateImage() { /* logic from previous Turn */ }
        function handleImageSelect(e) { /* logic from previous Turn */ }
        async function extractPrompt() { /* logic from previous Turn */ }
        function loadStore() { /* logic from previous Turn */ }
        function clearStore() { /* logic from previous Turn */ }
        function downloadImage() { const a = document.createElement("a"); a.href = currentImageUrl; a.download = "Masterpiece.jpg"; a.click(); }
        
        loadStore();
    </script>
</body>
</html>
