<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Premium AI Workspace</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-content { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 border-b pb-6 border-slate-200">
            <h1 class="text-3xl font-extrabold text-blue-600 text-center md:text-left">AI Master Workspace</h1>
        </header>

        <div class="flex space-x-6 border-b border-slate-200 pb-3 mb-10 overflow-x-auto">
            <button id="btn-promptTab" onclick="showTab('promptTab')" class="nav-tab text-slate-500 hover:text-blue-600 font-semibold pb-2 whitespace-nowrap transition-colors">Prompt Master</button>
            <button id="btn-imageTab" onclick="showTab('imageTab')" class="nav-tab text-blue-600 font-bold border-b-4 border-blue-600 pb-2 whitespace-nowrap transition-colors">Image Studio</button>
            <button id="btn-nicheTab" onclick="showTab('nicheTab')" class="nav-tab text-slate-500 hover:text-blue-600 font-semibold pb-2 whitespace-nowrap transition-colors">Content Manager</button>
            <button id="btn-visionTab" onclick="showTab('visionTab')" class="nav-tab text-slate-500 hover:text-blue-600 font-semibold pb-2 whitespace-nowrap transition-colors">Vision Master 👁️</button>
            <button id="btn-storeTab" onclick="showTab('storeTab')" class="nav-tab text-slate-500 hover:text-blue-600 font-semibold pb-2 whitespace-nowrap transition-colors">Store Master</button>
        </div>

        <div id="promptTab" class="tab-content hidden">
            <div class="bg-white p-7 rounded-2xl shadow-sm border border-slate-100 max-w-4xl mx-auto">
                <h2 class="text-xl font-bold mb-6 text-slate-900 border-l-4 border-blue-600 pl-3">Phase Base Prompt Generator</h2>
                <textarea id="basicIdea" class="w-full p-4 border border-slate-200 rounded-xl mb-4 focus:ring-2 focus:ring-blue-200 outline-none shadow-inner" rows="3" placeholder="Enter basic idea..."></textarea>
                <button onclick="generatePrompt()" id="genBtn" class="bg-blue-600 text-white px-7 py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-md">Enhance Prompt ✨</button>
                <div class="mt-8">
                    <h3 class="font-bold text-slate-700 mb-3">Result:</h3>
                    <div id="enhancedPrompt" class="w-full p-6 border border-slate-200 rounded-xl bg-slate-50 prose max-w-none min-h-[150px] shadow-inner"></div>
                    <button onclick="saveToStore('Prompt', rawPromptData)" class="mt-4 bg-emerald-500 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-sm">Save to Store 💾</button>
                </div>
            </div>
        </div>

        <div id="imageTab" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
                <div class="md:col-span-5 space-y-6 bg-white p-7 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-xl font-bold mb-4 text-slate-900 border-l-4 border-blue-600 pl-3">Pro Image Generator</h2>
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-slate-700">Render Quality</label>
                        <select id="imgQuality" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 outline-none"><option value="high quality, detailed, photorealistic, 8k">Cinematic Realistic</option></select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-slate-700">Aspect Ratio</label>
                        <select id="imgRatio" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 outline-none"><option value="1024x1024">1:1 (Square)</option><option value="1344x768">16:9 (Landscape)</option></select>
                    </div>
                    <div><label class="block text-sm font-semibold mb-2 text-slate-700">Master Prompt</label><textarea id="imagePrompt" class="w-full p-4 border border-slate-200 rounded-xl mb-2 outline-none shadow-inner" rows="4" placeholder="Paste master prompt here..."></textarea></div>
                    <button onclick="generateImage()" id="imgBtn" class="bg-blue-600 text-white px-7 py-3 rounded-xl hover:bg-blue-700 font-bold w-full shadow-md transition-all">Generate Image 🎨</button>
                    <button onclick="downloadImage()" id="downloadBtn" class="bg-emerald-600 text-white px-7 py-3 rounded-xl hover:bg-emerald-700 font-bold w-full mt-2 hidden shadow-md transition-all">Download Image ⬇️</button>
                    <span id="imgStatus" class="block mt-3 text-xs text-slate-500 font-medium text-center"></span>
                </div>
                <div class="md:col-span-7 bg-white p-7 rounded-2xl shadow-sm border border-slate-100 min-h-[400px]">
                    <h3 class="font-bold text-slate-700 mb-6">Image Preview</h3>
                    <div class="border-4 border-dashed border-slate-200 rounded-3xl p-4 flex justify-center items-center bg-slate-50 min-h-[400px] relative overflow-hidden group">
                        <img id="resultImage" class="max-w-full max-h-[600px] rounded-2xl hidden shadow-xl transition-transform group-hover:scale-105" />
                        <p id="imagePlaceholder" class="text-slate-400 font-semibold text-sm text-center">Generated image will appear here</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="nicheTab" class="tab-content hidden">
            <div class="bg-white p-7 rounded-2xl shadow-sm border border-slate-100 max-w-4xl mx-auto">
                <h2 class="text-xl font-bold mb-2 text-slate-900 border-l-4 border-blue-600 pl-3">Niche Strategy Builder</h2>
                <input type="text" id="nicheInput" class="w-full p-4 border border-slate-200 rounded-xl mb-4 shadow-inner" placeholder="E.g., Italian Pride, Wildlife...">
                <button onclick="generateContentStrategy()" id="contentBtn" class="bg-blue-600 text-white px-7 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md">Generate 🚀</button>
                <div class="mt-8">
                    <h3 class="font-bold text-slate-700 mb-3">Result:</h3>
                    <div id="contentResult" class="w-full p-6 border border-slate-200 rounded-xl bg-slate-50 prose prose-blue max-w-none min-h-[300px] shadow-inner"></div>
                    <button onclick="saveToStore('Niche Strategy', rawContentData)" class="mt-4 bg-emerald-500 text-white px-5 py-2 rounded-lg font-bold">Save 💾</button>
                </div>
            </div>
        </div>

        <div id="visionTab" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
                <div class="md:col-span-5 bg-white p-7 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-xl font-bold mb-4 text-slate-900 border-l-4 border-blue-600 pl-3">Vision Master 👁️</h2>
                    <div class="border-4 border-dashed border-slate-200 rounded-3xl p-4 flex flex-col justify-center items-center bg-slate-50 min-h-[350px] relative mb-6">
                        <input type="file" id="imageInput" accept="image/jpeg,image/png" onchange="handleImageSelect(event)" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                        <img id="uploadPreview" class="max-w-full max-h-[300px] rounded-xl hidden shadow-lg z-10" />
                        <div id="uploadPlaceholder" class="text-center text-slate-400 z-0">📸<br>Click to Upload Image</div>
                    </div>
                    <button onclick="extractPrompt()" id="extractBtn" class="bg-blue-600 text-white px-7 py-3 rounded-xl hover:bg-blue-700 font-bold w-full shadow-md">Extract Master Prompt 👁️</button>
                </div>
                <div class="md:col-span-7 bg-white p-7 rounded-2xl shadow-sm border border-slate-100 min-h-[400px]">
                    <h3 class="font-bold text-slate-700 mb-6">Vision Analysis</h3>
                    <div id="visionResult" class="w-full p-6 border border-slate-200 rounded-xl bg-slate-50 prose prose-blue max-w-none min-h-[300px] shadow-inner"></div>
                    <button onclick="saveToStore('Vision Prompt', rawVisionData)" class="mt-4 bg-emerald-500 text-white px-5 py-2 rounded-lg font-bold shadow-sm">Save 💾</button>
                </div>
            </div>
        </div>

        <div id="storeTab" class="tab-content hidden">
            <div class="bg-white p-7 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-xl font-bold mb-6 text-slate-900 border-l-4 border-blue-600 pl-3">Store Master</h2>
                <div class="flex space-x-3 mb-6">
                    <button onclick="loadStore()" class="bg-slate-700 text-white px-5 py-2 rounded-lg font-bold">Refresh 🔄</button>
                    <button onclick="clearStore()" class="bg-red-500 text-white px-5 py-2 rounded-lg font-bold">Clear All 🗑️</button>
                </div>
                <div id="savedItemsList" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const WORKER_URL = "https://my-ai-backend.freyaendicott.workers.dev"; // <--- CHANGE THIS
        
        let currentImageUrl = null;
        let rawContentData = "", rawPromptData = "", rawVisionData = "";
        let uploadedImageBase64 = "", uploadedImageMime = "";

        // --- TAB LOGIC ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-tab').forEach(btn => {
                btn.classList.remove('text-blue-600', 'font-bold', 'border-b-4', 'border-blue-600');
                btn.classList.add('text-slate-500', 'font-semibold');
            });
            const activeBtn = document.getElementById('btn-' + tabId);
            if(activeBtn) {
                activeBtn.classList.remove('text-slate-500', 'font-semibold');
                activeBtn.classList.add('text-blue-600', 'font-bold', 'border-b-4', 'border-blue-600');
            }
        }

        // --- CORE FUNCTIONS ---
        async function generatePrompt() {
            const basicIdea = document.getElementById('basicIdea').value;
            const btn = document.getElementById('genBtn');
            const resultBox = document.getElementById('enhancedPrompt');
            if (!basicIdea) return alert("Please enter basic idea!");
            btn.innerText = "Processing...";
            try {
                const response = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "generate_text", prompt: basicIdea }) });
                const data = await response.json();
                rawPromptData = data.result || data.error;
                resultBox.innerHTML = marked.parse(rawPromptData); 
            } catch (err) { alert("Check Connection or Worker URL"); }
            btn.innerText = "Enhance Prompt ✨";
        }

        async function generateImage() {
            const userPrompt = document.getElementById('imagePrompt').value;
            if (!userPrompt) return alert("Please enter a prompt!");
            const finalPrompt = userPrompt + ", " + document.getElementById('imgQuality').value; 
            const ratioStr = document.getElementById('imgRatio').value;
            const [width, height] = ratioStr.split('x').map(Number); 
            const btn = document.getElementById('imgBtn');
            const status = document.getElementById('imgStatus');
            const imgEl = document.getElementById('resultImage');
            btn.disabled = true; btn.innerText = "Wait...";
            status.innerText = "Generating Image... (15-40s)";
            imgEl.classList.add('hidden');
            try {
                const response = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "generate_image", prompt: finalPrompt, width: width, height: height }) });
                if (!response.ok) { alert("API Error or Model Loading"); } else {
                    const blob = await response.blob();
                    if(currentImageUrl) URL.revokeObjectURL(currentImageUrl);
                    currentImageUrl = URL.createObjectURL(blob);
                    imgEl.src = currentImageUrl;
                    imgEl.classList.remove('hidden');
                    document.getElementById('downloadBtn').classList.remove('hidden');
                    document.getElementById('imagePlaceholder').classList.add('hidden');
                }
            } catch (error) { alert("Error"); } finally { btn.disabled = false; btn.innerText = "Generate Image 🎨"; status.innerText = ""; }
        }

        async function generateContentStrategy() {
            const niche = document.getElementById('nicheInput').value;
            const btn = document.getElementById('contentBtn');
            const resultBox = document.getElementById('contentResult');
            if (!niche) return alert("Please enter a niche!");
            btn.disabled = true; btn.innerText = "Generating...";
            resultBox.innerHTML = "<p class='animate-pulse'>Building Strategy & Master Prompts... Please wait.</p>";
            try {
                const response = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "generate_text", prompt: "Act as an Expert. Niche: " + niche + ". Give strategy and 7-Phase Master Prompts." }) });
                const data = await response.json();
                rawContentData = data.result || data.error;
                resultBox.innerHTML = marked.parse(rawContentData); 
            } catch (err) { alert("Error"); } finally { btn.disabled = false; btn.innerText = "Generate 🚀"; }
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImageMime = file.type;
                uploadedImageBase64 = e.target.result.split(',')[1];
                document.getElementById('uploadPreview').src = e.target.result;
                document.getElementById('uploadPreview').classList.remove('hidden');
                document.getElementById('uploadPlaceholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function extractPrompt() {
            if (!uploadedImageBase64) return alert("Upload Image!");
            const btn = document.getElementById('extractBtn');
            const resultBox = document.getElementById('visionResult');
            btn.disabled = true; btn.innerText = "Analyzing...";
            try {
                const response = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "describe_image", image_data: uploadedImageBase64, mime_type: uploadedImageMime }) });
                const data = await response.json();
                rawVisionData = data.result || data.error;
                resultBox.innerHTML = marked.parse(rawVisionData); 
            } catch (err) { alert("Vision Error"); } finally { btn.disabled = false; btn.innerText = "Extract Master Prompt 👁️"; }
        }

        // --- STORE LOGIC ---
        function saveToStore(type, content) {
            if (!content) return;
            let store = JSON.parse(localStorage.getItem('myAIStore')) || [];
            store.unshift({ type, content, date: new Date().toLocaleString() });
            localStorage.setItem('myAIStore', JSON.stringify(store));
            alert("Saved!"); loadStore();
        }
        function loadStore() {
            let store = JSON.parse(localStorage.getItem('myAIStore')) || [];
            const listDiv = document.getElementById('savedItemsList');
            listDiv.innerHTML = store.length ? "" : "No items yet.";
            store.forEach((item) => {
                listDiv.innerHTML += `<div class="p-6 border rounded-xl bg-slate-50 shadow-sm"><div class="mb-2"><span class="bg-blue-600 text-white text-xs px-2 py-1 rounded">${item.type}</span> <span class="text-xs ml-2">${item.date}</span></div><div class="prose max-w-none text-sm">${marked.parse(item.content)}</div></div>`;
            });
        }
        function clearStore() { if(confirm("Clear all?")) { localStorage.removeItem('myAIStore'); loadStore(); } }
        function downloadImage() { const a = document.createElement("a"); a.href = currentImageUrl; a.download = "AI_Image.jpg"; a.click(); }
        
        loadStore();
    </script>
</body>
</html>
