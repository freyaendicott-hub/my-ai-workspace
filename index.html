<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 md:p-6">

    <div class="max-w-5xl mx-auto bg-white p-4 md:p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl md:text-3xl font-bold text-blue-600 mb-6">AI Master Workspace</h1>

        <div class="flex space-x-4 border-b pb-2 mb-6 overflow-x-auto">
            <button onclick="showTab('promptTab')" class="text-gray-500 hover:text-blue-500 font-semibold pb-1 whitespace-nowrap">Prompt Master</button>
            <button onclick="showTab('imageTab')" class="text-blue-500 font-semibold border-b-2 border-blue-500 pb-1 whitespace-nowrap">Image Studio</button>
            <button onclick="showTab('storeTab')" class="text-gray-500 hover:text-blue-500 whitespace-nowrap">Store Master</button>
        </div>

        <div id="promptTab" class="tab-content hidden">
            <h2 class="text-xl font-semibold mb-4">Phase Base Prompt Generator</h2>
            <textarea id="basicIdea" class="w-full p-3 border rounded-md mb-4" rows="3" placeholder="Enter basic idea..."></textarea>
            <button onclick="generatePrompt()" id="genBtn" class="bg-blue-600 text-white px-4 py-2 rounded-md">Enhance Prompt</button>
            <textarea id="enhancedPrompt" class="w-full p-3 border rounded-md mt-4 bg-gray-50" rows="5"></textarea>
        </div>

        <div id="imageTab" class="tab-content">
            <h2 class="text-xl font-semibold mb-4">Pro Image Generator</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Render Quality (Realistic Boost)</label>
                    <select id="imgQuality" class="w-full p-2 border rounded-md bg-gray-50">
                        <option value="high quality, detailed, realistic, 8k uhd, dslr, soft lighting">Standard Realistic</option>
                        <option value="photorealistic, hyper-realistic, 8k, raw photo, masterclass, dslr, sharp focus, cinematic, dramatic lighting, highly detailed surface texture">Cinematic Realistic (Best)</option>
                        <option value="masterpiece, highly detailed, sharp focus, 8k uhd, vibrant colors">Maximum Detail (Vibrant)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Aspect Ratio</label>
                    <select id="imgRatio" class="w-full p-2 border rounded-md bg-gray-50">
                        <option value="1024x1024">1:1 (Square - IG Post)</option>
                        <option value="896x1120">4:5 (Portrait - FB/IG)</option>
                        <option value="768x1344">9:16 (Vertical - Shorts/Reels)</option>
                        <option value="1344x768">16:9 (Landscape - YT Thumbnail)</option>
                        <option value="1152x896">4:3 (Standard Photo)</option>
                    </select>
                </div>
            </div>

            <textarea id="imagePrompt" class="w-full p-3 border rounded-md mb-4" rows="3" placeholder="Paste your master prompt here... (e.g., A cinematic photo of a leopard in Yala)"></textarea>
            
            <div class="flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-3 mb-4">
                <button onclick="generateImage()" id="imgBtn" class="bg-purple-600 text-white px-6 py-3 rounded-md hover:bg-purple-700 font-bold w-full md:w-auto">Generate Image</button>
                
                <button onclick="downloadImage()" id="downloadBtn" class="bg-green-600 text-white px-6 py-3 rounded-md hover:bg-green-700 font-bold w-full md:w-auto hidden">Download Image ⬇️</button>
                
                <span id="imgStatus" class="ml-4 text-sm text-gray-500 py-3"></span>
            </div>

            <div class="mt-6 border-2 border-dashed border-gray-300 rounded-lg p-4 flex justify-center items-center bg-gray-50 min-h-[300px]">
                <img id="resultImage" class="max-w-full max-h-[600px] rounded-md hidden shadow-lg" />
                <p id="imagePlaceholder" class="text-gray-400">Your generated image will appear here</p>
            </div>
        </div>

        <div id="storeTab" class="tab-content hidden">
            <h2 class="text-xl font-semibold mb-4">Store Master</h2>
            <p class="text-gray-500">Saved items are secure in your browser.</p>
        </div>

    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

        // --- ඔයාගේ Cloudflare Worker URL එක මෙතන තියෙනවා ---
        const WORKER_URL = "https://my-ai-backend.freyaendicott.workers.dev";
        let currentImageUrl = null; // To store the blob URL for downloading

        // Prompt Generation (Gemini)
        async function generatePrompt() {
            const basicIdea = document.getElementById('basicIdea').value;
            const btn = document.getElementById('genBtn');
            if (!basicIdea) return alert("Please enter basic idea!");
            btn.innerText = "Processing...";
            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "generate_text", prompt: basicIdea })
                });
                const data = await response.json();
                document.getElementById('enhancedPrompt').value = data.result || data.error;
            } catch (err) { alert("Error connecting to backend"); }
            btn.innerText = "Enhance Prompt";
        }

        // Image Generation (UPDATED Logic)
        async function generateImage() {
            const userPrompt = document.getElementById('imagePrompt').value;
            if (!userPrompt) return alert("Please enter a prompt!");

            const qualityPrompt = document.getElementById('imgQuality').value;
            const ratioStr = document.getElementById('imgRatio').value;
            const [width, height] = ratioStr.split('x').map(Number);

            // MAGIC TRICK: Appending quality keywords to the prompt
            const finalPrompt = userPrompt + ", " + qualityPrompt; 

            const btn = document.getElementById('imgBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const status = document.getElementById('imgStatus');
            const imgEl = document.getElementById('resultImage');
            const placeholder = document.getElementById('imagePlaceholder');

            btn.disabled = true;
            btn.innerText = "Processing...";
            downloadBtn.classList.add('hidden'); // Hide download button while processing
            status.innerText = "Generating high-quality image... (15-40s)";
            imgEl.classList.add('hidden');
            placeholder.classList.remove('hidden');

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "generate_image", prompt: finalPrompt, width: width, height: height })
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    alert(data.error);
                } else {
                    const blob = await response.blob();
                    
                    // Cleanup parana Object URL effectively freeing memory
                    if(currentImageUrl) URL.revokeObjectURL(currentImageUrl);
                    
                    currentImageUrl = URL.createObjectURL(blob);
                    
                    imgEl.src = currentImageUrl;
                    imgEl.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    downloadBtn.classList.remove('hidden'); // Show download button on success
                }
            } catch (error) {
                alert("Connection Error. Please try again.");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Image";
                status.innerText = "";
            }
        }

        // NEW: Download Image Logic
        function downloadImage() {
            if (!currentImageUrl) return alert("No image generated yet!");
            
            const ratioStr = document.getElementById('imgRatio').value;
            const timestamp = new Date().toISOString().slice(0, 10);
            
            // Dyanmically create a link to download the image
            const a = document.createElement("a");
            a.href = currentImageUrl;
            a.download = `my_ai_image_${ratioStr}_${timestamp}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a); // Cleanup
        }
    </script>
</body>
</html>
